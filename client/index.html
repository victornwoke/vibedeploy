<html lang="en" class="dark">

    <meta charset="UTF-8" />

    <meta name="description" content="Find out if your AI-built app is safe to launch. Get a free production readiness score across 13 critical DevOps categories in under 5 minutes. No engineering background required." />
    <meta name="keywords" content="production readiness, AI apps, DevOps, Lovable, Bolt, Cursor, deployment, CI/CD, secrets management, monitoring" />
    <meta name="author" content="Victor Nwoke" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vibedeploy.victornwoke.com/" />
    <meta property="og:title" content="VibeDeploy - Production Readiness for AI-Built Apps" />
    <meta property="og:description" content="AI can build the demo. VibeDeploy makes it production-ready. Free production readiness checker for founders using Lovable, Bolt, Cursor, and v0." />
    <meta property="og:image" content="/images/score-preview.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VibeDeploy - Production Readiness for AI-Built Apps" />

    <!-- Canonical -->
    <link rel="canonical" href="https://vibedeploy.victornwoke.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/vibedeploy-logo.png" />
    <link rel="apple-touch-icon" href="/images/vibedeploy-logo.png" />

    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Theme colour for mobile browsers -->
    <meta name="theme-color" content="#0F0F1A" />
    <script>
      try {
        const theme = localStorage.getItem("theme");
        if (theme === "light") {
          document.documentElement.classList.remove("dark");
        } else {
          document.documentElement.classList.add("dark");
        }
      } catch {
        document.documentElement.classList.add("dark");
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
